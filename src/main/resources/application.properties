# ─── KCET Cutoff Analyzer — Application Configuration ───────────────────────
#
# IMPORTANT: Update database credentials before running!
# Default MySQL port is 3306. Update if yours differs.
# ─────────────────────────────────────────────────────────────────────────────

# Server
server.port=8081

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/kcet_analyzer?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── File Upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ─── Upload directory (absolute path under user home) ───────────────────────
app.upload.dir=${user.home}/kcet-analyzer-uploads

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.kcet=INFO
logging.level.org.springframework.web=WARN
